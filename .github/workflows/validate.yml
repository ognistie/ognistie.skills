name: Validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Build portable skill archive
        run: python scripts/package_skill.py

      - name: Upload skill archive
        uses: actions/upload-artifact@v4
        with:
          name: ognistie-skill
          path: dist/ognistie-skill.zip
          if-no-files-found: error
